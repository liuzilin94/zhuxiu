<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数绘珠光 - 订单详情</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #5B8A8F; --primary-dark: #3D6B70; --bg-primary: #FDFBF7; --bg-card: #FFFFFF; --bg-muted: #F5F2EB; --accent-red: #C84B31; --accent-gold: #C9A962; --text-primary: #2C3E50; --text-secondary: #5D6D7E; --text-muted: #95A5A6; --border-light: #E8E4DC; --success: #52C41A; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --radius-md: 8px; --radius-lg: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Sans SC", sans-serif; background: var(--bg-primary); color: var(--text-primary); padding-bottom: 80px; min-height: 100vh; }
        .header { position: sticky; top: 0; z-index: 100; background: rgba(253,251,247,0.95); padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top)); border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 12px; }
        .back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        .back-btn svg { width: 20px; height: 20px; }
        .page-title { font-family: "Noto Serif SC", serif; font-size: 18px; font-weight: 600; }
        /* 订单状态 */
        .order-status { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 30px 20px; text-align: center; }
        .status-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.2); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
        .status-icon svg { width: 28px; height: 28px; }
        .status-text { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .status-desc { font-size: 13px; opacity: 0.9; }
        /* 物流信息 */
        .logistics-card { background: var(--bg-card); margin: 12px 16px; padding: 16px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
        .logistics-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 14px; font-weight: 600; }
        .logistics-header svg { width: 18px; height: 18px; color: var(--primary); }
        .logistics-content { padding-left: 20px; border-left: 2px solid var(--border-light); }
        .logistics-item { position: relative; padding-bottom: 16px; font-size: 13px; color: var(--text-secondary); }
        .logistics-item:last-child { padding-bottom: 0; }
        .logistics-item::before { content: ''; position: absolute; left: -25px; top: 4px; width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }
        .logistics-item:first-child::before { width: 12px; height: 12px; left: -27px; top: 2px; background: var(--primary); }
        .logistics-time { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        /* 地址 */
        .address-card { background: var(--bg-card); margin: 12px 16px; padding: 16px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); display: flex; gap: 12px; }
        .address-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .address-icon svg { width: 20px; height: 20px; color: var(--primary); }
        .address-info { flex: 1; }
        .address-user { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .address-detail { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        /* 商品 */
        .products-section { background: var(--bg-card); margin: 12px 16px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
        .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border-light); font-size: 14px; font-weight: 600; }
        .shop-name { display: flex; align-items: center; gap: 6px; }
        .shop-name svg { width: 16px; height: 16px; color: var(--accent-gold); }
        .product-item { display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border-light); }
        .product-item:last-child { border-bottom: none; }
        .product-image { width: 70px; height: 70px; border-radius: var(--radius-md); background: var(--bg-muted); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .product-image svg { width: 30px; height: 30px; color: var(--text-muted); }
        .product-info { flex: 1; }
        .product-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .product-spec { font-size: 12px; color: var(--text-muted); }
        .product-price { font-size: 14px; font-weight: 600; color: var(--accent-red); margin-top: 8px; }
        /* 价格 */
        .price-section { background: var(--bg-card); margin: 12px 16px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 16px; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .price-row:last-child { margin-bottom: 0; padding-top: 10px; border-top: 1px solid var(--border-light); font-weight: 600; }
        .price-label { color: var(--text-secondary); }
        .price-value { color: var(--accent-red); }
        /* 订单信息 */
        .order-info { background: var(--bg-card); margin: 12px 16px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 16px; }
        .info-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
        .info-row { display: flex; margin-bottom: 8px; font-size: 13px; }
        .info-row:last-child { margin-bottom: 0; }
        .info-label { color: var(--text-muted); width: 80px; }
        .info-value { color: var(--text-secondary); flex: 1; }
        /* 底部操作 */
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: var(--bg-card); border-top: 1px solid var(--border-light); display: flex; align-items: center; justify-content: flex-end; padding: 0 16px; padding-bottom: env(safe-area-inset-bottom); gap: 12px; z-index: 100; }
        .action-btn { height: 40px; padding: 0 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .btn-outline { background: transparent; border: 1px solid var(--border-light); color: var(--text-secondary); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; color: white; }
    </style>
</head>
<body>
    <header class="header">
        <div class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></div>
        <div class="page-title">订单详情</div>
    </header>
    <!-- 订单状态 -->
    <div class="order-status">
        <div class="status-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        <div class="status-text">已完成</div>
        <div class="status-desc">感谢您的购买，欢迎再次光临</div>
    </div>
    <!-- 物流信息 -->
    <div class="logistics-card">
        <div class="logistics-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>物流信息</div>
        <div class="logistics-content">
            <div class="logistics-item">已签收，感谢使用顺丰速运<div class="logistics-time">2024-03-15 14:30</div></div>
            <div class="logistics-item">配送员正在为您派送中<div class="logistics-time">2024-03-15 08:20</div></div>
            <div class="logistics-item">快件到达目的地分部<div class="logistics-time">2024-03-14 22:15</div></div>
        </div>
    </div>
    <!-- 地址 -->
    <div class="address-card">
        <div class="address-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
        <div class="address-info">
            <div class="address-user">张三 <span style="color: var(--accent-red); font-size: 12px; margin-left: 8px;">默认</span></div>
            <div class="address-detail">福建省泉州市鲤城区中山路123号<br>138****8888</div>
        </div>
    </div>
    <!-- 商品 -->
    <div class="products-section">
        <div class="section-header">
            <div class="shop-name"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>数绘珠光旗舰店</div>
        </div>
        <div class="product-item">
            <div class="product-image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>
            <div class="product-info">
                <div class="product-name">珠绣平安香囊</div>
                <div class="product-spec">标准款 x1</div>
                <div class="product-price">¥128</div>
            </div>
        </div>
        <div class="product-item">
            <div class="product-image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg></div>
            <div class="product-info">
                <div class="product-name">凤凰牡丹胸针</div>
                <div class="product-spec">精品款 x2</div>
                <div class="product-price">¥512</div>
            </div>
        </div>
    </div>
    <!-- 价格 -->
    <div class="price-section">
        <div class="price-row"><span class="price-label">商品总价</span><span class="price-value">¥640</span></div>
        <div class="price-row"><span class="price-label">运费</span><span class="price-value">¥0</span></div>
        <div class="price-row"><span class="price-label">实付金额</span><span class="price-value">¥630</span></div>
    </div>
    <!-- 订单信息 -->
    <div class="order-info">
        <div class="info-title">订单信息</div>
        <div class="info-row"><span class="info-label">订单编号</span><span class="info-value">20240317001234</span></div>
        <div class="info-row"><span class="info-label">下单时间</span><span class="info-value">2024-03-17 10:30:25</span></div>
        <div class="info-row"><span class="info-label">支付方式</span><span class="info-value">微信支付</span></div>
    </div>
    <!-- 底部操作 -->
    <div class="action-bar">
        <button class="action-btn btn-outline" onclick="alert('售后申请已提交')">申请售后</button>
        <button class="action-btn btn-primary" onclick="window.location.href='商品详情.html'">再次购买</button>
    </div>
    <script>
        // 返回
        document.querySelector('.back-btn').addEventListener('click', () => window.history.back());
    </script>
</body>
</html>
