<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数绘珠光 - 商品详情</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5B8A8F;
            --primary-light: #7BA3A8;
            --primary-dark: #3D6B70;
            --primary-darker: #2D5458;
            --bg-primary: #FDFBF7;
            --bg-secondary: #F8F5EF;
            --bg-card: #FFFFFF;
            --bg-muted: #F5F2EB;
            --accent-red: #C84B31;
            --accent-gold: #C9A962;
            --text-primary: #2C3E50;
            --text-secondary: #5D6D7E;
            --text-muted: #95A5A6;
            --text-inverse: #FFFFFF;
            --border-light: #E8E4DC;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-bottom: 80px;
            min-height: 100vh;
        }
        /* 顶部导航 */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
        }
        .header-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }
        .header-btn svg { width: 20px; height: 20px; color: var(--text-primary); }
        .header-actions { display: flex; gap: 8px; }
        /* 轮播图 */
        .banner {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: var(--bg-secondary);
            overflow: hidden;
        }
        .banner-slide {
            position: absolute;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .banner-slide.active { opacity: 1; }
        .banner-placeholder {
            width: 60%; height: 60%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--bg-muted), var(--border-light));
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .banner-placeholder svg { width: 50%; height: 50%; color: var(--text-muted); }
        .banner-dots {
            position: absolute;
            bottom: 16px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 8px;
        }
        .banner-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transition: all 0.3s;
        }
        .banner-dot.active { width: 18px; border-radius: 3px; background: var(--text-inverse); }
        /* 商品信息 */
        .product-info {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 0 0 var(--radius-xl) var(--radius-xl);
            margin-top: -20px;
            position: relative;
        }
        .product-price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .product-price {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-red);
        }
        .product-price::before { content: '¥'; font-size: 16px; font-weight: 400; }
        .product-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .product-rating svg { width: 14px; height: 14px; color: var(--accent-gold); fill: var(--accent-gold); }
        .product-name {
            font-family: "Noto Serif SC", serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .product-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .product-tag {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-muted);
            padding: 4px 10px;
            border-radius: 4px;
        }
        .divider { height: 1px; background: var(--border-light); margin: 16px 0; }
        /* 规格选择 */
        .spec-section, .quantity-section {
            background: var(--bg-card);
            padding: 16px 20px;
        }
        .spec-title, .quantity-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .spec-options { display: flex; flex-wrap: wrap; gap: 10px; }
        .spec-option {
            padding: 10px 20px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .spec-option.active {
            border-color: var(--primary);
            background: rgba(91, 138, 143, 0.1);
            color: var(--primary);
        }
        .quantity-section { display: flex; align-items: center; justify-content: space-between; }
        .quantity-selector { display: flex; align-items: center; gap: 12px; }
        .quantity-btn {
            width: 32px; height: 32px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .quantity-btn svg { width: 16px; height: 16px; color: var(--text-secondary); }
        .quantity-value { font-size: 16px; font-weight: 500; min-width: 24px; text-align: center; }
        /* 商品介绍 */
        .intro-section, .recommend-section {
            background: var(--bg-card);
            padding: 20px;
            margin-top: 12px;
        }
        .intro-title, .recommend-title {
            font-family: "Noto Serif SC", serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .intro-text { font-size: 14px; line-height: 1.8; color: var(--text-secondary); }
        .intro-images { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; }
        .intro-image { width: 100px; height: 100px; border-radius: var(--radius-md); background: var(--bg-secondary); flex-shrink: 0; }
        /* 相关推荐 */
        .recommend-title { margin-bottom: 16px; }
        .recommend-grid { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
        .recommend-card { width: 120px; flex-shrink: 0; }
        .recommend-image { width: 100%; aspect-ratio: 1; border-radius: var(--radius-md); background: var(--bg-secondary); margin-bottom: 8px; }
        .recommend-name { font-size: 13px; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .recommend-price { font-size: 14px; font-weight: 600; color: var(--accent-red); }
        .recommend-price::before { content: '¥'; font-size: 11px; font-weight: 400; }
        /* 底部操作栏 */
        .action-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 80px;
            background: var(--bg-card);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            padding: 0 16px;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .action-btn svg { width: 22px; height: 22px; color: var(--text-secondary); }
        .action-btn span { font-size: 11px; color: var(--text-muted); }
        .action-buttons { flex: 1; display: flex; gap: 12px; margin-left: 12px; }
        .btn-cart {
            flex: 1; height: 48px;
            border-radius: 24px;
            border: 1.5px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-buy {
            flex: 1; height: 48px;
            border-radius: 24px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <button class="header-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="header-actions">
            <button class="header-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </button>
            <button class="header-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            </button>
        </div>
    </div>
    <!-- 轮播图 -->
    <div class="banner">
        <div class="banner-slide active"><div class="banner-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div></div>
        <div class="banner-slide"><div class="banner-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg></div></div>
        <div class="banner-dots"><div class="banner-dot active"></div><div class="banner-dot"></div></div>
    </div>
    <!-- 商品信息 -->
    <div class="product-info">
        <div class="product-price-row">
            <div class="product-price">128</div>
            <div class="product-rating"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>4.8 (256评价)</div>
        </div>
        <div class="product-name">珠绣平安香囊</div>
        <div class="product-tags"><span class="product-tag">传统纹样</span><span class="product-tag">手工制作</span><span class="product-tag">天然香料</span></div>
    </div>
    <!-- 规格选择 -->
    <div class="spec-section">
        <div class="spec-title">选择规格</div>
        <div class="spec-options"><div class="spec-option active">标准款</div><div class="spec-option">精品款</div><div class="spec-option">礼盒装</div></div>
    </div>
    <!-- 数量选择 -->
    <div class="quantity-section">
        <div class="quantity-title">数量</div>
        <div class="quantity-selector">
            <button class="quantity-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
            <span class="quantity-value">1</span>
            <button class="quantity-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        </div>
    </div>
    <div class="divider"></div>
    <!-- 商品介绍 -->
    <div class="intro-section">
        <div class="intro-title">商品介绍</div>
        <div class="intro-text">珠绣平安香囊选用优质丝绸面料，采用泉州传统珠绣工艺精心制作。香囊内含天然艾草、薄荷等中草药香料，具有驱蚊防虫、提神醒脑的功效。适合挂在车内、衣柜或随身佩戴。</div>
        <div class="intro-images"><div class="intro-image"></div><div class="intro-image"></div><div class="intro-image"></div></div>
    </div>
    <!-- 相关推荐 -->
    <div class="recommend-section">
        <div class="recommend-title">相关推荐</div>
        <div class="recommend-grid">
            <div class="recommend-card"><div class="recommend-image"></div><div class="recommend-name">凤凰牡丹胸针</div><div class="recommend-price">256</div></div>
            <div class="recommend-card"><div class="recommend-image"></div><div class="recommend-name">珠绣材料包</div><div class="recommend-price">88</div></div>
            <div class="recommend-card"><div class="recommend-image"></div><div class="recommend-name">真丝绣布</div><div class="recommend-price">168</div></div>
        </div>
    </div>
    <!-- 底部操作栏 -->
    <div class="action-bar">
        <button class="action-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg><span>客服</span></button>
        <button class="action-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>收藏</span></button>
        <div class="action-buttons">
            <button class="btn-cart">加入购物车</button>
            <button class="btn-buy">立即购买</button>
        </div>
    </div>
    <script>
        // 规格切换
        document.querySelectorAll('.spec-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.spec-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            });
        });
        // 轮播图
        let slideIndex = 0;
        setInterval(() => {
            slideIndex = (slideIndex + 1) % 2;
            document.querySelectorAll('.banner-slide').forEach((s, i) => s.classList.toggle('active', i === slideIndex));
            document.querySelectorAll('.banner-dot').forEach((d, i) => d.classList.toggle('active', i === slideIndex));
        }, 5000);

        // 返回按钮
        document.querySelector('.header-btn').addEventListener('click', () => window.history.back());

        // 收藏按钮
        document.querySelectorAll('.header-btn')[1].addEventListener('click', function() {
            this.classList.toggle('active');
        });

        // 加入购物车
        document.querySelector('.btn-cart').addEventListener('click', () => {
            alert('已加入购物车');
        });

        // 立即购买
        document.querySelector('.btn-buy').addEventListener('click', () => {
            window.location.href = '结算页.html';
        });
    </script>
</body>
</html>
