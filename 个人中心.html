<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数绘珠光 - 个人中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5B8A8F;
            --primary-light: #7BA3A8;
            --primary-dark: #3D6B70;
            --bg-primary: #FDFBF7;
            --bg-card: #FFFFFF;
            --bg-muted: #F5F2EB;
            --accent-red: #C84B31;
            --accent-gold: #C9A962;
            --text-primary: #2C3E50;
            --text-secondary: #5D6D7E;
            --text-muted: #95A5A6;
            --border-light: #E8E4DC;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Sans SC", sans-serif; background: var(--bg-primary); color: var(--text-primary); padding-bottom: 70px; min-height: 100vh; }

        /* 顶部标题栏 */
        .header { position: sticky; top: 0; z-index: 100; background: rgba(253,251,247,0.95); backdrop-filter: blur(10px); padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top)); border-bottom: 1px solid var(--border-light); }
        .header-title { font-family: "Noto Serif SC", serif; font-size: 18px; font-weight: 600; text-align: center; }

        /* 顶部用户信息 */
        .profile-header {
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 40px 20px 30px;
            color: white;
        }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .avatar { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.5); }
        .avatar svg { width: 32px; height: 32px; }
        .user-details { flex: 1; }
        .username { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .user-level { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .level-badge { width: 16px; height: 16px; border-radius: 50%; background: var(--accent-gold); }
        .user-points { font-size: 13px; opacity: 0.9; margin-top: 8px; }
        .points-link { color: white; text-decoration: underline; }
        /* 会员入口 */
        .vip-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            margin: -20px 16px 16px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .vip-left { display: flex; align-items: center; gap: 12px; }
        .vip-icon { width: 40px; height: 40px; border-radius: 8px; background: linear-gradient(135deg, var(--accent-gold), #A88B4A); display: flex; align-items: center; justify-content: center; }
        .vip-icon svg { width: 24px; height: 24px; color: white; }
        .vip-text { font-size: 14px; font-weight: 600; }
        .vip-desc { font-size: 12px; color: var(--text-muted); }
        .vip-btn { padding: 8px 16px; background: linear-gradient(135deg, var(--accent-gold), #A88B4A); color: white; border: none; border-radius: 16px; font-size: 12px; cursor: pointer; }
        /* 订单快捷入口 */
        .order-section { background: var(--bg-card); margin-bottom: 12px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid var(--border-light); }
        .section-title { font-size: 16px; font-weight: 600; }
        .section-more { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .section-more svg { width: 14px; height: 14px; }
        .order-tabs { display: flex; padding: 16px; }
        .order-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .order-icon { width: 28px; height: 28px; position: relative; }
        .order-icon svg { width: 24px; height: 24px; color: var(--text-secondary); }
        .order-badge { position: absolute; top: -4px; right: -4px; min-width: 16px; height: 16px; background: var(--accent-red); color: white; font-size: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .order-label { font-size: 12px; color: var(--text-secondary); }
        /* 功能菜单 */
        .menu-section { background: var(--bg-card); }
        .menu-item { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid var(--border-light); cursor: pointer; }
        .menu-item:last-child { border-bottom: none; }
        .menu-icon { width: 24px; height: 24px; margin-right: 12px; color: var(--primary); }
        .menu-icon svg { width: 24px; height: 24px; }
        .menu-text { flex: 1; font-size: 15px; }
        .menu-arrow { color: var(--text-muted); }
        .menu-arrow svg { width: 18px; height: 18px; }
        /* 底部导航 */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--bg-card); border-top: 1px solid var(--border-light); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .tab-item-nav { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; }
        .tab-item-nav.active .tab-icon { color: var(--primary); }
        .tab-item-nav.active .tab-label { color: var(--primary); }
        .tab-icon { width: 24px; height: 24px; color: var(--text-muted); }
        .tab-label { font-size: 10px; color: var(--text-muted); }
    </style>
</head>
<body>
    <!-- 顶部用户信息 -->
    <div class="profile-header">
        <div class="user-info">
            <div class="avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
            <div class="user-details">
                <div class="username">数绘珠光</div>
                <div class="user-level"><div class="level-badge"></div>LV.3 绣师</div>
                <div class="user-points">积分: 2,580 <span class="points-link">积分明细</span></div>
            </div>
        </div>
    </div>
    <!-- 会员卡 -->
    <div class="vip-card">
        <div class="vip-left">
            <div class="vip-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
            <div>
                <div class="vip-text">银卡会员</div>
                <div class="vip-desc">享9折优惠</div>
            </div>
        </div>
        <button class="vip-btn">立即升级</button>
    </div>
    <!-- 订单快捷入口 -->
    <div class="order-section">
        <div class="section-header">
            <div class="section-title">我的订单</div>
            <div class="section-more">查看全部 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
        </div>
        <div class="order-tabs">
            <div class="order-tab"><div class="order-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><span class="order-label">待支付</span></div>
            <div class="order-tab"><div class="order-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span class="order-badge">2</span></div><span class="order-label">待发货</span></div>
            <div class="order-tab"><div class="order-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div><span class="order-label">待收货</span></div>
            <div class="order-tab"><div class="order-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><span class="order-label">已完成</span></div>
        </div>
    </div>
    <!-- 功能菜单 -->
    <div class="menu-section">
        <div class="menu-item"><div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><span class="menu-text">我的收藏</span><div class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div></div>
        <div class="menu-item"><div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><span class="menu-text">我的设计</span><div class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div></div>
        <div class="menu-item"><div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><span class="menu-text">会员中心</span><div class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div></div>
        <div class="menu-item"><div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div><span class="menu-text">设置</span><div class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div></div>
        <div class="menu-item"><div class="menu-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><span class="menu-text">帮助与反馈</span><div class="menu-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div></div>
    </div>
    <!-- 底部导航 -->
    <nav class="tab-bar">
        <div class="tab-item-nav"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="tab-label">首页</span></div>
        <div class="tab-item-nav"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span class="tab-label">文化馆</span></div>
        <div class="tab-item-nav"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="tab-label">商城</span></div>
        <div class="tab-item-nav"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><span class="tab-label">设计工坊</span></div>
        <div class="tab-item-nav"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span class="tab-label">社区</span></div>
        <div class="tab-item-nav active"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="tab-label">我的</span></div>
    </nav>
    <script>
        // 底部导航跳转
        document.querySelectorAll('.tab-item-nav').forEach(item => {
            item.addEventListener('click', function() {
                const label = this.querySelector('.tab-label').textContent;
                switch(label) {
                    case '首页': window.location.href = '首页.html'; break;
                    case '文化馆': window.location.href = '文化馆.html'; break;
                    case '商城': window.location.href = '商城列表.html'; break;
                    case '设计工坊': window.location.href = '设计工坊.html'; break;
                    case '社区': window.location.href = '作品社区.html'; break;
                    case '我的': window.location.href = '个人中心.html'; break;
                }
            });
        });

        // 订单标签跳转
        document.querySelectorAll('.order-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                window.location.href = '订单详情.html';
            });
        });

        // 菜单跳转
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', function() {
                const text = this.querySelector('.menu-text').textContent;
                if (text === '我的收藏') {
                    alert('收藏功能');
                } else if (text === '我的设计') {
                    alert('我的设计');
                } else if (text === '会员中心') {
                    alert('会员中心');
                } else if (text === '设置') {
                    alert('设置');
                } else if (text === '帮助与反馈') {
                    alert('帮助与反馈');
                }
            });
        });
    </script>
</body>
</html>
