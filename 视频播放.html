<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数绘珠光 - 视频播放</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #5B8A8F; --primary-dark: #3D6B70; --bg-primary: #000; --bg-card: #1a1a1a; --text-primary: #fff; --text-secondary: #999; --text-muted: #666; --border-light: #333; --radius-md: 8px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Sans SC", sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        /* 视频播放器 */
        .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        .video-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary-dark), #1a1a1a); }
        .play-icon { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-icon svg { width: 36px; height: 36px; color: white; margin-left: 5px; }
        .video-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 40px 16px 16px; }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; margin-bottom: 12px; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 2px; width: 35%; }
        .controls-row { display: flex; align-items: center; justify-content: space-between; }
        .controls-left { display: flex; align-items: center; gap: 16px; }
        .control-btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .control-btn svg { width: 24px; height: 24px; }
        .time-display { font-size: 13px; color: var(--text-secondary); }
        .controls-right { display: flex; align-items: center; gap: 12px; }
        /* 视频信息 */
        .video-info { padding: 16px; background: var(--bg-card); }
        .video-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
        .video-meta { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-secondary); }
        .video-meta-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted); }
        /* 功能按钮 */
        .action-buttons { display: flex; gap: 20px; padding: 16px; background: var(--bg-card); border-top: 1px solid var(--border-light); }
        .action-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 12px; }
        .action-btn svg { width: 24px; height: 24px; }
        .action-btn.active { color: var(--primary); }
        /* 相关推荐 */
        .recommend-section { padding: 16px; background: var(--bg-card); margin-top: 8px; }
        .recommend-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
        .video-list { display: flex; flex-direction: column; gap: 12px; }
        .video-item { display: flex; gap: 12px; cursor: pointer; }
        .video-thumb { width: 120px; height: 68px; border-radius: var(--radius-md); background: linear-gradient(135deg, var(--primary-dark), var(--primary)); flex-shrink: 0; display: flex; align-items: center; justify-content: center; position: relative; }
        .video-duration { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.7); color: white; font-size: 11px; padding: 2px 4px; border-radius: 2px; }
        .play-icon-sm { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; }
        .play-icon-sm svg { width: 14px; height: 14px; color: white; }
        .video-item-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .video-item-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-item-meta { font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>
    <!-- 视频播放器 -->
    <div class="video-container">
        <div class="video-placeholder">
            <div class="play-icon"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
        </div>
        <div class="video-controls">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <div class="controls-row">
                <div class="controls-left">
                    <button class="control-btn"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
                    <button class="control-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg></button>
                    <span class="time-display">03:30 / 10:00</span>
                </div>
                <div class="controls-right">
                    <button class="control-btn">1x</button>
                    <button class="control-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
                </div>
            </div>
        </div>
    </div>
    <!-- 视频信息 -->
    <div class="video-info">
        <div class="video-title">珠绣入门基础教程 - 从零开始学习珠绣技法</div>
        <div class="video-meta">
            <span>2.3万播放</span>
            <span class="video-meta-dot"></span>
            <span>1280赞</span>
            <span class="video-meta-dot"></span>
            <span>2024-03-15</span>
        </div>
    </div>
    <!-- 功能按钮 -->
    <div class="action-buttons">
        <button class="action-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>点赞</button>
        <button class="action-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>评论</button>
        <button class="action-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>分享</button>
        <button class="action-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>缓存</button>
    </div>
    <!-- 相关推荐 -->
    <div class="recommend-section">
        <div class="recommend-title">相关推荐</div>
        <div class="video-list">
            <div class="video-item">
                <div class="video-thumb">
                    <span class="video-duration">08:30</span>
                    <div class="play-icon-sm"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                </div>
                <div class="video-item-info">
                    <div class="video-item-title">如何设计一件珠绣作品</div>
                    <div class="video-item-meta">1.2万播放</div>
                </div>
            </div>
            <div class="video-item">
                <div class="video-thumb">
                    <span class="video-duration">05:20</span>
                    <div class="play-icon-sm"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                </div>
                <div class="video-item-info">
                    <div class="video-item-title">珠绣配色技巧详解</div>
                    <div class="video-item-meta">8.5千播放</div>
                </div>
            </div>
            <div class="video-item">
                <div class="video-thumb">
                    <span class="video-duration">12:15</span>
                    <div class="play-icon-sm"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                </div>
                <div class="video-item-info">
                    <div class="video-item-title">传统凤穿牡丹纹样详解</div>
                    <div class="video-item-meta">1.5万播放</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // 返回
        document.querySelector('.back-btn').addEventListener('click', () => window.history.back());
        // 视频卡片跳转
        document.querySelectorAll('.video-item').forEach(item => {
            item.addEventListener('click', () => {
                // 实际应该跳转详情页
            });
        });
    </script>
</body>
</html>
