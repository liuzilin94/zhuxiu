<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数绘珠光 - 首页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5B8A8F;
            --primary-light: #7BA3A8;
            --primary-dark: #3D6B70;
            --primary-darker: #2D5458;
            --bg-primary: #FDFBF7;
            --bg-secondary: #F8F5EF;
            --bg-card: #FFFFFF;
            --bg-muted: #F5F2EB;
            --accent-red: #C84B31;
            --accent-gold: #C9A962;
            --text-primary: #2C3E50;
            --text-secondary: #5D6D7E;
            --text-muted: #95A5A6;
            --text-inverse: #FFFFFF;
            --border-light: #E8E4DC;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-bottom: 60px;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(253, 251, 247, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            border-bottom: 1px solid var(--border-light);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-family: "Noto Serif SC", serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-full);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .icon-btn:active {
            background: var(--bg-muted);
        }

        .icon-btn svg {
            width: 22px;
            height: 22px;
            color: var(--text-secondary);
        }

        /* 搜索框 */
        .search-bar {
            margin-top: 12px;
        }

        .search-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg-muted);
            border-radius: 20px;
            padding: 10px 16px;
            gap: 8px;
        }

        .search-input-wrapper svg {
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* 轮播图 */
        .banner {
            padding: 16px;
        }

        .banner-container {
            position: relative;
            width: 100%;
            height: 200px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .banner-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-darker) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .banner-slide.active {
            opacity: 1;
        }

        .banner-content {
            text-align: center;
            color: var(--text-inverse);
            padding: 20px;
        }

        .banner-title {
            font-family: "Noto Serif SC", serif;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .banner-desc {
            font-size: 14px;
            opacity: 0.9;
        }

        .banner-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .banner-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transition: all 0.3s;
        }

        .banner-dot.active {
            width: 18px;
            border-radius: 3px;
            background: var(--text-inverse);
        }

        /* 快捷入口 */
        .quick-entry {
            padding: 0 16px 20px;
        }

        .quick-entry-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .quick-entry-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .quick-entry-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .quick-entry-item:active .quick-entry-icon {
            transform: scale(0.95);
        }

        .quick-entry-icon svg {
            width: 28px;
            height: 28px;
        }

        .quick-entry-icon.culture { background: linear-gradient(135deg, #7BA3A8, #5B8A8F); }
        .quick-entry-icon.mall { background: linear-gradient(135deg, #C84B31, #A83A26); }
        .quick-entry-icon.workshop { background: linear-gradient(135deg, #C9A962, #A88B4A); }
        .quick-entry-icon.community { background: linear-gradient(135deg, #5D6D7E, #4A5A6A); }

        .quick-entry-icon svg { color: white; }

        .quick-entry-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 区块标题 */
        .section {
            padding: 0 16px;
            margin-bottom: 24px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-family: "Noto Serif SC", serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            position: relative;
            padding-left: 12px;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 16px;
            background: var(--primary);
            border-radius: 2px;
        }

        .section-more {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .section-more svg {
            width: 14px;
            height: 14px;
        }

        /* 商品卡片 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image-placeholder {
            width: 60%;
            height: 60%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--bg-muted), var(--border-light));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image-placeholder svg {
            width: 40%;
            height: 40%;
            color: var(--text-muted);
        }

        .product-info {
            padding: 12px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-tags {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .product-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .product-price {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-red);
        }

        .product-price::before {
            content: '¥';
            font-size: 12px;
        }

        .add-cart-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .add-cart-btn:active {
            transform: scale(0.9);
        }

        .add-cart-btn svg {
            width: 16px;
            height: 16px;
            color: white;
        }

        /* 纹样卡片 */
        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .pattern-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .pattern-card:active {
            transform: scale(0.98);
        }

        .pattern-image {
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .pattern-favorite {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .pattern-favorite svg {
            width: 14px;
            height: 14px;
            color: var(--text-muted);
        }

        .pattern-favorite.active svg {
            color: var(--accent-red);
            fill: var(--accent-red);
        }

        .pattern-info {
            padding: 10px 12px;
        }

        .pattern-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .pattern-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* 视频卡片 */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .video-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
        }

        .video-card:active {
            transform: scale(0.98);
        }

        .video-cover {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-darker));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .play-btn svg {
            width: 20px;
            height: 20px;
            color: white;
            margin-left: 3px;
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .video-info {
            padding: 12px;
        }

        .video-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .video-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .video-meta-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        /* 底部导航栏 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg-card);
            border-top: 1px solid var(--border-light);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .tab-item:active {
            background: var(--bg-muted);
        }

        .tab-item.active .tab-icon {
            color: var(--primary);
        }

        .tab-item.active .tab-label {
            color: var(--primary);
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            color: var(--text-muted);
        }

        .tab-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* 空状态占位 */
        .placeholder-block {
            height: 100px;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <div class="logo">数绘珠光</div>
            <div class="header-right">
                <button class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="search-bar">
            <div class="search-input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" class="search-input" placeholder="搜索珠绣纹样、商品...">
            </div>
        </div>
    </header>

    <!-- 轮播图 -->
    <section class="banner">
        <div class="banner-container">
            <div class="banner-slide active">
                <div class="banner-content">
                    <div class="banner-title">非遗传承 · 匠心之作</div>
                    <div class="banner-desc">探索泉州珠绣的千年之美</div>
                </div>
            </div>
            <div class="banner-slide">
                <div class="banner-content">
                    <div class="banner-title">新品上市 · 限时优惠</div>
                    <div class="banner-desc">精选文创产品8折起</div>
                </div>
            </div>
            <div class="banner-slide">
                <div class="banner-content">
                    <div class="banner-title">设计大赛 · 火热进行</div>
                    <div class="banner-desc">万元奖金等你来拿</div>
                </div>
            </div>
            <div class="banner-dots">
                <div class="banner-dot active"></div>
                <div class="banner-dot"></div>
                <div class="banner-dot"></div>
            </div>
        </div>
    </section>

    <!-- 快捷入口 -->
    <section class="quick-entry">
        <div class="quick-entry-grid">
            <div class="quick-entry-item">
                <div class="quick-entry-icon culture">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                </div>
                <span class="quick-entry-label">文化馆</span>
            </div>
            <div class="quick-entry-item">
                <div class="quick-entry-icon mall">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 0 1-8 0"/>
                    </svg>
                </div>
                <span class="quick-entry-label">商城</span>
            </div>
            <div class="quick-entry-item">
                <div class="quick-entry-icon workshop">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <span class="quick-entry-label">工坊</span>
            </div>
            <div class="quick-entry-item">
                <div class="quick-entry-icon community">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <span class="quick-entry-label">社区</span>
            </div>
        </div>
    </section>

    <!-- 热门推荐 - 商品 -->
    <section class="section">
        <div class="section-header">
            <div class="section-title">热门推荐</div>
            <div class="section-more">
                查看更多
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </div>
        </div>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <div class="product-image-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">

                        </svg>
                    </div>
                </div>
                <div class="product-info">

                    </div>
                </div>
            </div>
            <div class="product-card">
                <div class="product-image">
                    <div class="product-image-placeholder">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                    </div>
                </div>
                <div class="product-info">
                    <div class="product-name">凤凰牡丹胸针</div>
                    <div class="product-tags">精品手工 | 收藏级</div>
                    <div class="product-bottom">
                        <div class="product-price">256</div>
                        <button class="add-cart-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 纹样推荐 -->
    <section class="section">
        <div class="section-header">
            <div class="section-title">传统纹样</div>
            <div class="section-more">
                查看更多
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </div>
        </div>
        <div class="pattern-grid">
            <div class="pattern-card">
                <div class="pattern-image">
                    <div class="pattern-favorite">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                    </div>
                </div>
                <div class="pattern-info">
                    <div class="pattern-name">凤穿牡丹</div>
                    <div class="pattern-desc">传统吉祥纹样</div>
                </div>
            </div>
            <div class="pattern-card">
                <div class="pattern-image">
                    <div class="pattern-favorite active">
                        <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                        </svg>
                    </div>
                </div>

    <script>
        // 轮播图自动切换
        let currentSlide = 0;
        const slides = document.querySelectorAll('.banner-slide');
        const dots = document.querySelectorAll('.banner-dot');

        function showSlide(index) {
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[index].classList.add('active');
            dots[index].classList.add('active');
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            showSlide(currentSlide);
        }

        setInterval(nextSlide, 5000);

        // 点击dots切换
        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                currentSlide = index;
                showSlide(currentSlide);
            });
        });

        // 底部导航跳转
        document.querySelectorAll('.tab-item').forEach(item => {
            item.addEventListener('click', function() {
                const label = this.querySelector('.tab-label').textContent;
                switch(label) {
                    case '首页': window.location.href = '首页.html'; break;
                    case '文化馆': window.location.href = '文化馆.html'; break;
                    case '设计工坊': window.location.href = '设计工坊.html'; break;
                    case '社区': window.location.href = '作品社区.html'; break;
                    case '我的': window.location.href = '个人中心.html'; break;
                }
            });
        });

        // 快捷入口跳转
        document.querySelectorAll('.quick-entry-item').forEach(item => {
            item.addEventListener('click', function() {
                const label = this.querySelector('.quick-entry-label').textContent;
                switch(label) {
                    case '文化馆': window.location.href = '文化馆.html'; break;
                    case '商城': window.location.href = '商城列表.html'; break;
                    case '工坊': window.location.href = '设计工坊.html'; break;
                    case '社区': window.location.href = '作品社区.html'; break;
                }
            });
        });

        // 商品卡片跳转
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', () => window.location.href = '商品详情.html');
        });

        // 纹样卡片跳转
        document.querySelectorAll('.pattern-card').forEach(card => {
            card.addEventListener('click', () => window.location.href = '纹样详情.html');
        });

        // 视频卡片跳转
        document.querySelectorAll('.video-card').forEach(card => {
            card.addEventListener('click', () => window.location.href = '视频播放.html');
        });

        // 收藏按钮
        document.querySelectorAll('.pattern-favorite').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                this.classList.toggle('active');
            });
        });

        // 加入购物车
        document.querySelectorAll('.add-cart-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                this.style.transform = 'scale(0.8)';
                setTimeout(() => { this.style.transform = 'scale(1)'; }, 200);
                alert('已加入购物车');
            });
        });

        // 查看更多跳转
        document.querySelectorAll('.section-more').forEach(btn => {
            btn.style.cursor = 'pointer';
        });
    </script>
