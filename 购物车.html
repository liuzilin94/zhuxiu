<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数绘珠光 - 购物车</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5B8A8F;
            --primary-light: #7BA3A8;
            --primary-dark: #3D6B70;
            --primary-darker: #2D5458;
            --bg-primary: #FDFBF7;
            --bg-secondary: #F8F5EF;
            --bg-card: #FFFFFF;
            --bg-muted: #F5F2EB;
            --accent-red: #C84B31;
            --accent-gold: #C9A962;
            --text-primary: #2C3E50;
            --text-secondary: #5D6D7E;
            --text-muted: #95A5A6;
            --text-inverse: #FFFFFF;
            --border-light: #E8E4DC;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Sans SC", sans-serif; background: var(--bg-primary); color: var(--text-primary); padding-bottom: 140px; min-height: 100vh; }
        /* 顶部导航 */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(253,251,247,0.95); backdrop-filter: blur(10px);
            padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
            border-bottom: 1px solid var(--border-light);
            display: flex; align-items: center; justify-content: space-between;
        }
        .back-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .back-btn svg { width: 20px; height: 20px; color: var(--text-primary); }
        .page-title { font-family: "Noto Serif SC", serif; font-size: 18px; font-weight: 600; }
        .edit-btn { font-size: 14px; color: var(--primary); cursor: pointer; }
        /* 全选栏 */
        .select-bar {
            background: var(--bg-card); padding: 12px 16px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border-light);
        }
        .checkbox {
            width: 22px; height: 22px; border: 2px solid var(--border-light); border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .checkbox.checked { background: var(--primary); border-color: var(--primary); }
        .checkbox.checked svg { display: block; }
        .checkbox svg { display: none; width: 12px; height: 12px; color: white; }
        .select-label { font-size: 14px; color: var(--text-secondary); }
        /* 购物车列表 */
        .cart-list { padding: 12px 16px; }
        .cart-item {
            background: var(--bg-card); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px;
            display: flex; gap: 12px; box-shadow: var(--shadow-sm);
        }
        .cart-item-checkbox { padding-top: 4px; }
        .cart-item-image {
            width: 80px; height: 80px; border-radius: var(--radius-md); background: var(--bg-secondary);
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
        }
        .cart-item-image svg { width: 40px; height: 40px; color: var(--text-muted); }
        .cart-item-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .cart-item-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .cart-item-spec { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .cart-item-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
        .cart-item-price { font-size: 16px; font-weight: 700; color: var(--accent-red); }
        .cart-item-price::before { content: '¥'; font-size: 12px; font-weight: 400; }
        .quantity-selector { display: flex; align-items: center; gap: 8px; }
        .quantity-btn {
            width: 26px; height: 26px; border-radius: var(--radius-sm); border: 1px solid var(--border-light);
            background: var(--bg-card); display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .quantity-btn svg { width: 12px; height: 12px; color: var(--text-secondary); }
        .quantity-value { font-size: 14px; min-width: 20px; text-align: center; }
        .delete-btn { color: var(--text-muted); cursor: pointer; padding: 4px; }
        .delete-btn svg { width: 18px; height: 18px; }
        /* 底部结算栏 */
        .checkout-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 100px; background: var(--bg-card); border-top: 1px solid var(--border-light);
            display: flex; align-items: center; padding: 0 16px; padding-bottom: env(safe-area-inset-bottom); z-index: 100;
        }
        .checkout-left { flex: 1; }
        .checkout-total { font-size: 14px; color: var(--text-secondary); }
        .checkout-total-price { font-size: 24px; font-weight: 700; color: var(--accent-red); }
        .checkout-total-price::before { content: '¥'; font-size: 14px; font-weight: 400; }
        .checkout-btn {
            width: 120px; height: 48px; border-radius: 24px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; font-size: 16px; font-weight: 500; cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></div>
        <div class="page-title">购物车</div>
        <div class="edit-btn">编辑</div>
    </header>
    <!-- 全选栏 -->
    <div class="select-bar">
        <div class="checkbox checked" onclick="toggleAll(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="select-label">全选</span>
    </div>
    <!-- 购物车列表 -->
    <div class="cart-list">
        <div class="cart-item">
            <div class="cart-item-checkbox checkbox checked" onclick="toggleCheck(this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="cart-item-image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>
            <div class="cart-item-info">
                <div>
                    <div class="cart-item-name">珠绣平安香囊</div>
                    <div class="cart-item-spec">标准款</div>
                </div>
                <div class="cart-item-bottom">
                    <div class="cart-item-price">128</div>
                    <div class="quantity-selector">
                        <button class="quantity-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                        <span class="quantity-value">1</span>
                        <button class="quantity-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                    </div>
                </div>
            </div>
            <div class="delete-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
        </div>
        <div class="cart-item">
            <div class="cart-item-checkbox checkbox checked" onclick="toggleCheck(this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="cart-item-image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/></svg></div>
            <div class="cart-item-info">
                <div>
                    <div class="cart-item-name">凤凰牡丹胸针</div>
                    <div class="cart-item-spec">精品款</div>
                </div>
                <div class="cart-item-bottom">
                    <div class="cart-item-price">256</div>
                    <div class="quantity-selector">
                        <button class="quantity-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                        <span class="quantity-value">2</span>
                        <button class="quantity-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                    </div>
                </div>
            </div>
            <div class="delete-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
        </div>
        <div class="cart-item">
            <div class="cart-item-checkbox checkbox" onclick="toggleCheck(this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="cart-item-image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
            <div class="cart-item-info">
                <div>
                    <div class="cart-item-name">珠绣材料包入门套装</div>
                    <div class="cart-item-spec">标准装</div>
                </div>
                <div class="cart-item-bottom">
                    <div class="cart-item-price">88</div>
                    <div class="quantity-selector">
                        <button class="quantity-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                        <span class="quantity-value">1</span>
                        <button class="quantity-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                    </div>
                </div>
            </div>
            <div class="delete-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
        </div>
    </div>
    <!-- 底部结算栏 -->
    <div class="checkout-bar">
        <div class="checkout-left">
            <div class="checkout-total">合计: <span class="checkout-total-price">512</span></div>
        </div>
        <button class="checkout-btn">结算</button>
    </div>
    <script>
        function toggleCheck(el) { el.classList.toggle('checked'); }
        function toggleAll(el) { el.classList.toggle('checked'); document.querySelectorAll('.cart-item-checkbox').forEach(c => c.classList.toggle('checked', el.classList.contains('checked'))); }

        // 返回
        document.querySelector('.back-btn').addEventListener('click', () => window.history.back());

        // 结算按钮
        document.querySelector('.checkout-btn').addEventListener('click', () => {
            window.location.href = '结算页.html';
        });

        // 删除按钮
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if(confirm('确定要删除这件商品吗？')) {
                    this.closest('.cart-item').remove();
                }
            });
        });
    </script>
</body>
</html>
