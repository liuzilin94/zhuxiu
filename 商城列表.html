<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数绘珠光 - 产品商城</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5B8A8F;
            --primary-light: #7BA3A8;
            --primary-dark: #3D6B70;
            --primary-darker: #2D5458;
            --bg-primary: #FDFBF7;
            --bg-secondary: #F8F5EF;
            --bg-card: #FFFFFF;
            --bg-muted: #F5F2EB;
            --accent-red: #C84B31;
            --accent-gold: #C9A962;
            --text-primary: #2C3E50;
            --text-secondary: #5D6D7E;
            --text-muted: #95A5A6;
            --text-inverse: #FFFFFF;
            --border-light: #E8E4DC;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-bottom: 70px;
            min-height: 100vh;
        }

        /* 顶部导航 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(253, 251, 247, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            border-bottom: 1px solid var(--border-light);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            color: var(--text-primary);
        }

        .page-title {
            font-family: "Noto Serif SC", serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-full);
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .icon-btn svg {
            width: 22px;
            height: 22px;
            color: var(--text-secondary);
        }

        .cart-badge {
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -2px;
            right: -2px;
            min-width: 16px;
            height: 16px;
            background: var(--accent-red);
            color: white;
            font-size: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        /* 分类标签 */
        .category-tabs {
            display: flex;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-light);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            position: sticky;
            top: 89px;
            z-index: 90;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-item {
            flex: 1;
            min-width: 70px;
            padding: 14px 12px;
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            white-space: nowrap;
        }

        .tab-item.active {
            color: var(--primary);
            font-weight: 500;
            background: var(--bg-muted);
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* 商品网格 */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }

        .product-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .product-image-placeholder {
            width: 50%;
            height: 50%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--bg-muted), var(--border-light));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-image-placeholder svg {
            width: 50%;
            height: 50%;
            color: var(--text-muted);
        }

        .product-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--accent-red);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .product-info {
            padding: 12px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.4;
            height: 2.8em;
        }

        .product-tags {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .product-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-red);
        }

        .product-price::before {
            content: '¥';
            font-size: 12px;
            font-weight: 400;
        }

        .add-cart-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .add-cart-btn:active {
            transform: scale(0.9);
        }

        .add-cart-btn svg {
            width: 18px;
            height: 18px;
            color: white;
        }

        /* 底部导航栏 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--bg-card);
            border-top: 1px solid var(--border-light);
            display: flex;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .tab-item-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
        }

        .tab-item-nav:active {
            background: var(--bg-muted);
        }

        .tab-item-nav.active .tab-icon {
            color: var(--primary);
        }

        .tab-item-nav.active .tab-label {
            color: var(--primary);
        }

        .tab-icon {
            width: 24px;
            height: 24px;
            color: var(--text-muted);
        }

        .tab-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        /* 加载更多 */
        .load-more {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <div class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </div>
                <div class="page-title">产品商城</div>
            </div>
            <div class="header-right">
                <button class="icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
                <button class="icon-btn cart-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 0 1-8 0"/>
                    </svg>
                    <span class="cart-count">3</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 分类标签 -->
    <div class="category-tabs">
        <div class="tab-item">材料包</div>
        <div class="tab-item">文创单品</div>
        <div class="tab-item">配件工具</div>
        <div class="tab-item active">全部</div>
    </div>

    <!-- 商品列表 -->
    <div class="product-grid">
        <div class="product-card">
            <div class="product-image">
                <span class="product-tag">热销</span>
                <div class="product-image-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    </svg>
                </div>
            </div>
            <div class="product-info">
                <div class="product-name">珠绣平安香囊</div>
                <div class="product-tags">传统纹样 | 手工制作</div>
                <div class="product-bottom">
                    <div class="product-price">128</div>
                    <button class="add-cart-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <div class="product-image-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                    </svg>
                </div>
            </div>
            <div class="product-info">
                <div class="product-name">凤凰牡丹胸针</div>
                <div class="product-tags">精品手工 | 收藏级</div>
                <div class="product-bottom">
                    <div class="product-price">256</div>
                    <button class="add-cart-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <span class="product-tag">新品</span>
                <div class="product-image-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    </svg>
                </div>
            </div>
            <div class="product-info">
                <div class="product-name">珠绣材料包入门套装</div>
                <div class="product-tags">新手必备 | 齐全配件</div>
                <div class="product-bottom">
                    <div class="product-price">88</div>
                    <button class="add-cart-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <div class="product-image-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                    </svg>
                </div>
            </div>
            <div class="product-info">
                <div class="product-name">真丝绣布卷轴</div>
                <div class="product-tags">优质面料 | 精工制作</div>
                <div class="product-bottom">
                    <div class="product-price">168</div>
                    <button class="add-cart-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <span class="product-tag">折扣</span>
                <div class="product-image-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                </div>
            </div>
            <div class="product-info">
                <div class="product-name">天然淡水珍珠散珠</div>
                <div class="product-tags">A级珍珠 | 多规格</div>
                <div class="product-bottom">
                    <div class="product-price">45</div>
                    <button class="add-cart-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-image">
                <div class="product-image-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                    </svg>
                </div>
            </div>
            <div class="product-info">
                <div class="product-name">专业绣花针套装</div>
                <div class="product-tags">22件套 | 德国工艺</div>
                <div class="product-bottom">
                    <div class="product-price">36</div>
                    <button class="add-cart-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="load-more">上拉加载更多</div>

    <!-- 底部导航栏 -->
    <nav class="tab-bar">
        <div class="tab-item-nav">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span class="tab-label">首页</span>
        </div>
        <div class="tab-item-nav">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
            <span class="tab-label">文化馆</span>
        </div>
        <div class="tab-item-nav">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <span class="tab-label">设计工坊</span>
        </div>
        <div class="tab-item-nav">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span class="tab-label">社区</span>
        </div>
        <div class="tab-item-nav">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="tab-label">我的</span>
        </div>
    </nav>

    <script>
        // 分类标签切换
        const categoryTabs = document.querySelectorAll('.category-tabs .tab-item');
        categoryTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                categoryTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });

        // 购物车按钮动画
        const addCartBtns = document.querySelectorAll('.add-cart-btn');
        addCartBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                btn.style.transform = 'scale(0.8)';
                setTimeout(() => {
                    btn.style.transform = 'scale(1)';
                }, 200);
                alert('已加入购物车');
            });
        });

        // 底部导航跳转
        document.querySelectorAll('.tab-item-nav').forEach(item => {
            item.addEventListener('click', function() {
                const label = this.querySelector('.tab-label').textContent;
                switch(label) {
                    case '首页': window.location.href = 'index.html'; break;
                    case '文化馆': window.location.href = '文化馆.html'; break;
                    case '设计工坊': window.location.href = '设计工坊.html'; break;
                    case '社区': window.location.href = '作品社区.html'; break;
                    case '我的': window.location.href = '个人中心.html'; break;
                }
            });
        });

        // 商品卡片跳转
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', () => window.location.href = '商品详情.html');
        });
    </script>
</body>
</html>
