<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数绘珠光 - 作品社区</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5B8A8F;
            --primary-light: #7BA3A8;
            --primary-dark: #3D6B70;
            --bg-primary: #FDFBF7;
            --bg-card: #FFFFFF;
            --bg-muted: #F5F2EB;
            --accent-red: #C84B31;
            --accent-gold: #C9A962;
            --text-primary: #2C3E50;
            --text-secondary: #5D6D7E;
            --text-muted: #95A5A6;
            --border-light: #E8E4DC;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --radius-md: 8px;
            --radius-lg: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Sans SC", sans-serif; background: var(--bg-primary); color: var(--text-primary); padding-bottom: 80px; min-height: 100vh; }
        /* 顶部 */
        .header { position: sticky; top: 0; z-index: 100; background: rgba(253,251,247,0.95); backdrop-filter: blur(10px); padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top)); border-bottom: 1px solid var(--border-light); }
        .header-title { font-family: "Noto Serif SC", serif; font-size: 18px; font-weight: 600; }
        /* 话题标签 */
        .topics { background: var(--bg-card); padding: 12px 16px; border-bottom: 1px solid var(--border-light); overflow-x: auto; }
        .topics-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
        .topics-list { display: flex; gap: 8px; }
        .topic-tag { padding: 6px 12px; background: var(--bg-muted); border-radius: 16px; font-size: 12px; color: var(--text-secondary); white-space: nowrap; cursor: pointer; }
        .topic-tag.active { background: var(--primary); color: white; }
        /* 作品列表 */
        .feed { padding: 12px 16px; }
        .post-card { background: var(--bg-card); border-radius: var(--radius-lg); margin-bottom: 16px; box-shadow: var(--shadow-sm); overflow: hidden; }
        .post-header { display: flex; align-items: center; padding: 12px; gap: 10px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-light), var(--primary)); display: flex; align-items: center; justify-content: center; }
        .post-avatar svg { width: 20px; height: 20px; color: white; }
        .post-author-info { flex: 1; }
        .post-author { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .post-time { font-size: 12px; color: var(--text-muted); }
        .post-content { padding: 0 12px 12px; }
        .post-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 8px; }
        .post-images { display: grid; gap: 4px; border-radius: var(--radius-md); overflow: hidden; }
        .post-images.single { grid-template-columns: 1fr; }
        .post-images.multi { grid-template-columns: repeat(2, 1fr); }
        .post-image { aspect-ratio: 1; background: var(--bg-muted); display: flex; align-items: center; justify-content: center; }
        .post-image svg { width: 30%; height: 30%; color: var(--text-muted); }
        .post-actions { display: flex; align-items: center; padding: 12px; border-top: 1px solid var(--border-light); gap: 20px; }
        .post-action { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
        .post-action svg { width: 18px; height: 18px; }
        .post-action.liked { color: var(--accent-red); }
        .post-action.liked svg { fill: var(--accent-red); }
        /* 发布按钮 */
        .fab { position: fixed; bottom: 90px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(91,138,143,0.4); cursor: pointer; z-index: 90; }
        .fab svg { width: 24px; height: 24px; color: white; }
        /* 底部导航 */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: var(--bg-card); border-top: 1px solid var(--border-light); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .tab-item-nav { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; }
        .tab-item-nav.active .tab-icon { color: var(--primary); }
        .tab-item-nav.active .tab-label { color: var(--primary); }
        .tab-icon { width: 24px; height: 24px; color: var(--text-muted); }
        .tab-label { font-size: 10px; color: var(--text-muted); }
    </style>
</head>
<body>
    <!-- 顶部 -->
    <header class="header">
        <div class="header-title">作品社区</div>
    </header>
    <!-- 话题标签 -->
    <div class="topics">
        <div class="topics-label">热门话题:</div>
        <div class="topics-list">
            <div class="topic-tag active">#珠绣新手入门</div>
            <div class="topic-tag">#作品展示</div>
            <div class="topic-tag">#设计灵感</div>
            <div class="topic-tag">#传承故事</div>
        </div>
    </div>
    <!-- 作品流 -->
    <div class="feed">
        <div class="post-card">
            <div class="post-header">
                <div class="post-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                <div class="post-author-info">
                    <div class="post-author">小绣娘</div>
                    <div class="post-time">12分钟前</div>
                </div>
            </div>
            <div class="post-content">
                <div class="post-title">我的第一件珠绣作品</div>
                <div class="post-images single">
                    <div class="post-image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
                </div>
            </div>
            <div class="post-actions">
                <div class="post-action liked"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>256</div>
                <div class="post-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>32</div>
                <div class="post-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>分享</div>
            </div>
        </div>
        <div class="post-card">
            <div class="post-header">
                <div class="post-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                <div class="post-author-info">
                    <div class="post-author">传承人李老师</div>
                    <div class="post-time">1小时前</div>
                </div>
            </div>
            <div class="post-content">
                <div class="post-title">传承人新作 - 龙凤呈祥</div>
                <div class="post-images multi">
                    <div class="post-image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/></svg></div>
                    <div class="post-image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
                </div>
            </div>
            <div class="post-actions">
                <div class="post-action liked"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>1024</div>
                <div class="post-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>128</div>
                <div class="post-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>分享</div>
            </div>
        </div>
    </div>
    <!-- 发布按钮 -->
    <div class="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    <!-- 底部导航 -->
    <nav class="tab-bar">
        <div class="tab-item-nav"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="tab-label">首页</span></div>
        <div class="tab-item-nav"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span class="tab-label">文化馆</span></div>
        <div class="tab-item-nav"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="tab-label">商城</span></div>
        <div class="tab-item-nav"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg><span class="tab-label">设计工坊</span></div>
        <div class="tab-item-nav active"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span class="tab-label">社区</span></div>
        <div class="tab-item-nav"><svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="tab-label">我的</span></div>
    </nav>
    <script>
        // 底部导航跳转
        document.querySelectorAll('.tab-item-nav').forEach(item => {
            item.addEventListener('click', function() {
                const label = this.querySelector('.tab-label').textContent;
                switch(label) {
                    case '首页': window.location.href = 'index.html'; break;
                    case '文化馆': window.location.href = '文化馆.html'; break;
                    case '商城': window.location.href = '商城列表.html'; break;
                    case '设计工坊': window.location.href = '设计工坊.html'; break;
                    case '社区': window.location.href = '作品社区.html'; break;
                    case '我的': window.location.href = '个人中心.html'; break;
                }
            });
        });

        // 话题标签切换
        document.querySelectorAll('.topic-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                document.querySelectorAll('.topic-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 点赞按钮
        document.querySelectorAll('.post-action').forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.classList.contains('liked')) {
                    this.classList.remove('liked');
                } else {
                    this.classList.add('liked');
                }
            });
        });

        // 发布按钮
        document.querySelector('.fab').addEventListener('click', () => {
            window.location.href = '发布作品.html';
        });
    </script>
</body>
</html>
