<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数绘珠光 - 支付页</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #5B8A8F; --primary-dark: #3D6B70; --bg-primary: #FDFBF7; --bg-card: #FFFFFF; --bg-muted: #F5F2EB; --accent-red: #C84B31; --accent-gold: #C9A962; --text-primary: #2C3E50; --text-secondary: #5D6D7E; --text-muted: #95A5A6; --border-light: #E8E4DC; --radius-lg: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Sans SC", sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .header { padding: 30px 20px 20px; text-align: center; }
        .header-title { font-family: "Noto Serif SC", serif; font-size: 20px; font-weight: 600; }
        /* 支付金额 */
        .amount-section { background: var(--bg-card); margin: 20px 16px; padding: 30px; border-radius: var(--radius-lg); text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .amount-label { font-size: 14px; color: var(--text-secondary); margin-bottom: 10px; }
        .amount-value { font-size: 42px; font-weight: 700; color: var(--accent-red); }
        .amount-value::before { content: '¥'; font-size: 24px; }
        .order-no { font-size: 13px; color: var(--text-muted); margin-top: 12px; }
        /* 支付方式 */
        .payment-section { background: var(--bg-card); margin: 20px 16px; border-radius: var(--radius-lg); box-shadow: 0 2px 8px rgba(0,0,0,0.04); overflow: hidden; }
        .section-title { font-size: 15px; font-weight: 600; padding: 16px; border-bottom: 1px solid var(--border-light); }
        .payment-options { padding: 8px 0; }
        .payment-option { display: flex; align-items: center; padding: 16px; cursor: pointer; border-bottom: 1px solid var(--border-light); }
        .payment-option:last-child { border-bottom: none; }
        .payment-option.active .radio { border-color: var(--primary); background: var(--primary); }
        .payment-option.active .radio::after { content: ''; display: block; width: 8px; height: 8px; background: white; border-radius: 50%; margin: 3px; }
        .payment-icon { width: 32px; height: 32px; margin-right: 12px; display: flex; align-items: center; justify-content: center; }
        .payment-icon svg { width: 28px; height: 28px; }
        .payment-name { flex: 1; font-size: 15px; }
        .radio { width: 20px; height: 20px; border: 2px solid var(--border-light); border-radius: 50%; }
        /* 支付按钮 */
        .pay-btn { display: block; width: calc(100% - 32px); margin: 30px 16px; height: 52px; border-radius: 26px; border: none; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; font-size: 17px; font-weight: 500; cursor: pointer; box-shadow: 0 4px 16px rgba(91,138,143,0.3); }
        /* 安全保障 */
        .security { text-align: center; padding: 20px; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 6px; }
        .security svg { width: 14px; height: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">确认支付</div>
    </div>
    <!-- 支付金额 -->
    <div class="amount-section">
        <div class="amount-label">支付金额</div>
        <div class="amount-value">630</div>
        <div class="order-no">订单号: 20240317001234</div>
    </div>
    <!-- 支付方式 -->
    <div class="payment-section">
        <div class="section-title">选择支付方式</div>
        <div class="payment-options">
            <div class="payment-option active">
                <div class="payment-icon"><svg viewBox="0 0 24 24" fill="#07C160"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
                <div class="payment-name">微信支付</div>
                <div class="radio"></div>
            </div>
            <div class="payment-option">
                <div class="payment-icon"><svg viewBox="0 0 24 24" fill="#1678F8"><path d="M13.28 3.28L8.56 8l4.72 4.72-1.06 1.06L6.44 8l5.78-5.78 1.06 1.06zM18.44 8l-4.72-4.72-4.72 4.72 1.06 1.06L15.56 8l-5.78 5.78-1.06-1.06L18.44 8z"/></svg></div>
                <div class="payment-name">支付宝</div>
                <div class="radio"></div>
            </div>
            <div class="payment-option">
                <div class="payment-icon"><svg viewBox="0 0 24 24" fill="#C84B31"><rect x="2" y="4" width="20" height="16" rx="2"/></svg></div>
                <div class="payment-name">银行卡支付</div>
                <div class="radio"></div>
            </div>
        </div>
    </div>
    <!-- 支付按钮 -->
    <button class="pay-btn" onclick="window.location.href='支付成功.html'">立即支付</button>
    <!-- 安全保障 -->
    <div class="security">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        支付安全由XX保障
    </div>
    <script>
        document.querySelectorAll('.payment-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            });
        });
    </script>
</body>
</html>
