<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数绘珠光 - 发布作品</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #5B8A8F; --primary-dark: #3D6B70; --bg-primary: #FDFBF7; --bg-card: #FFFFFF; --bg-muted: #F5F2EB; --accent-red: #C84B31; --accent-gold: #C9A962; --text-primary: #2C3E50; --text-secondary: #5D6D7E; --text-muted: #95A5A6; --border-light: #E8E4DC; --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --radius-md: 8px; --radius-lg: 12px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Sans SC", sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .header { position: sticky; top: 0; z-index: 100; background: rgba(253,251,247,0.95); padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top)); border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
        .cancel-btn { background: none; border: none; font-size: 15px; color: var(--text-secondary); cursor: pointer; }
        .header-title { font-family: "Noto Serif SC", serif; font-size: 17px; font-weight: 600; }
        .publish-btn { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 8px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        /* 内容编辑 */
        .content-section { padding: 16px; background: var(--bg-card); }
        .content-input { width: 100%; min-height: 120px; border: none; font-size: 15px; line-height: 1.6; color: var(--text-primary); resize: none; outline: none; font-family: inherit; }
        .content-input::placeholder { color: var(--text-muted); }
        /* 图片/视频上传 */
        .media-section { background: var(--bg-card); padding: 16px; margin-top: 12px; }
        .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .media-item { aspect-ratio: 1; border-radius: var(--radius-md); background: var(--bg-muted); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: pointer; }
        .media-item.add { border: 2px dashed var(--border-light); background: transparent; }
        .media-item svg { width: 32px; height: 32px; color: var(--text-muted); }
        .media-item .remove { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.5); color: white; display: flex; align-items: center; justify-content: center; }
        .media-item .remove svg { width: 14px; height: 14px; }
        /* 话题选择 */
        .topic-section { background: var(--bg-card); padding: 16px; margin-top: 12px; }
        .section-label { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .section-label svg { width: 18px; height: 18px; color: var(--accent-gold); }
        .topic-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .topic-tag { padding: 8px 14px; background: var(--bg-muted); border-radius: 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; }
        .topic-tag.active { background: var(--primary); color: white; }
        /* 位置 */
        .location-section { background: var(--bg-card); padding: 16px; margin-top: 12px; display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-secondary); cursor: pointer; }
        .location-section svg { width: 18px; height: 18px; }
        /* 可见性 */
        .visibility-section { background: var(--bg-card); padding: 16px; margin-top: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .visibility-left { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .visibility-left svg { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <header class="header">
        <button class="cancel-btn">取消</button>
        <div class="header-title">发布作品</div>
        <button class="publish-btn">发布</button>
    </header>
    <!-- 内容编辑 -->
    <div class="content-section">
        <textarea class="content-input" placeholder="分享你的珠绣作品或心得..."></textarea>
    </div>
    <!-- 图片/视频上传 -->
    <div class="media-section">
        <div class="media-grid">
            <div class="media-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
            <div class="media-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
            <div class="media-item add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
        </div>
    </div>
    <!-- 话题选择 -->
    <div class="topic-section">
        <div class="section-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>添加话题</div>
        <div class="topic-list">
            <div class="topic-tag">#珠绣新手入门</div>
            <div class="topic-tag">#作品展示</div>
            <div class="topic-tag">#设计灵感</div>
            <div class="topic-tag">#传承故事</div>
        </div>
    </div>
    <!-- 位置 -->
    <div class="location-section">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        添加位置
    </div>
    <!-- 可见性 -->
    <div class="visibility-section">
        <div class="visibility-left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            公开
        </div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
</body>
</html>
